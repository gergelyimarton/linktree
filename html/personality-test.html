<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Személyiség Teszt</title>
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/personality-test.css">
    <link rel="stylesheet" href="../CSS/language-switcher.css">
    <style>:root { --lang-accent: #f39c12; }</style>
</head>
<body class="dark-theme">

    <div class="all-content" id="all-content">
        <main class="container">

            <h1 id="page-title"
                data-hu="Személyiségteszt"
                data-en="Personality Test">Személyiségteszt</h1>

            <p class="intro"
               data-hu="Válaszolj az 1–5 skálán: 1 = egyáltalán nem jellemző, 5 = nagyon jellemző."
               data-en="Answer on a 1–5 scale: 1 = not at all characteristic, 5 = very characteristic.">
               Válaszolj az 1–5 skálán: 1 = egyáltalán nem jellemző, 5 = nagyon jellemző.
            </p>

            <!-- Dimenzió választó -->
            <section id="dim-selector">
                <p class="selector-label"
                   data-hu="Válaszd ki a vizsgált dimenziót:"
                   data-en="Choose the dimension to explore:">
                   Válaszd ki a vizsgált dimenziót:
                </p>
                <div class="dim-grid" id="dim-grid">
                    <!-- JS tölti fel -->
                </div>
                <div class="load-wrap">
                    <input type="file" id="loadInput" accept=".json" class="hidden">
                    <button class="btn btn--secondary" id="loadBtn"
                            data-hu="Mentés betöltése" data-en="Load save">Mentés betöltése</button>
                </div>
            </section>

            <!-- Kvíz -->
            <section id="quiz" class="hidden"></section>

            <div id="controls" class="controls hidden">
                <button id="prevBtn" class="btn" disabled
                        data-hu="Vissza" data-en="Back">Vissza</button>
                <button id="saveBtn" class="btn btn--secondary"
                        data-hu="Mentés" data-en="Save">Mentés</button>
                <button id="nextBtn" class="btn"
                        data-hu="Következő" data-en="Next">Következő</button>
            </div>

            <template id="question-template">
                <div class="question-card">
                    <h2 class="q-title"></h2>
                    <div class="scale"></div>
                </div>
            </template>

            <!-- Eredmény -->
            <section id="result" class="result hidden">
                <h2 data-hu="Eredményed" data-en="Your Result">Eredményed</h2>
                <div id="type-code-wrap" class="hidden">
                    <div id="type-code"></div>
                </div>
                <div id="result-dims"></div>
                <div class="result-actions">
                    <button id="downloadBtn" class="btn btn--secondary"
                            data-hu="Letöltés" data-en="Download">Letöltés</button>
                    <button id="retryBtn" class="btn"
                            data-hu="Új dimenzió választása" data-en="Choose another dimension">
                        Új dimenzió választása
                    </button>
                </div>
            </section>

        </main>

        <button class="btn back-button"
                data-hu="Vissza" data-en="Go back"
                onclick="location.href='../lidar/html/projects.html'">Vissza</button>
    </div>

    <script src="../JS/language-switcher.js"></script>
    <script src="../JS/personality-test.js" type="module"></script>
</body>
</html>
